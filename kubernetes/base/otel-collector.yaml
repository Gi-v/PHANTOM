apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: phantom
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {endpoint: 0.0.0.0:4317}
          http: {endpoint: 0.0.0.0:4318}

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 256

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls: {insecure: true}
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels: {app: otel-collector}
  template:
    metadata:
      labels: {app: otel-collector}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8889"
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.98.0
        args: ["--config=/conf/config.yaml"]
        ports:
        - {containerPort: 4317, name: grpc}
        - {containerPort: 4318, name: http}
        - {containerPort: 8889, name: metrics}
        volumeMounts:
        - name: config
          mountPath: /conf
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits: {cpu: 500m, memory: 512Mi}
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector: {app: otel-collector}
  ports:
  - {name: grpc, port: 4317}
  - {name: http, port: 4318}
  - {name: metrics, port: 8889}
