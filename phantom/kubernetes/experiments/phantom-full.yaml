# PHANTOM full predictive scaling — applied during research experiments
# Disables HPA, enables PredictiveScaler CRs for all target services
apiVersion: v1
kind: ConfigMap
metadata:
  name: phantom-config
  namespace: phantom
data:
  PHANTOM_ENABLED: "true"
  ENV: "experiment"
  LOG_LEVEL: "info"
  PREDICTION_HORIZON: "300"
---
# Delete any existing HPA objects so PHANTOM has full control
# kubectl delete hpa --all -n phantom  (run manually before experiment)
apiVersion: phantom.io/v1alpha1
kind: PredictiveScaler
metadata:
  name: frontend-scaler
  namespace: phantom
spec:
  targetDeployment: frontend
  minReplicas: 2
  maxReplicas: 20
  predictionHorizonSeconds: 300
  confidenceThreshold: "0.75"
  scaleUpBuffer: "1.2"
---
apiVersion: phantom.io/v1alpha1
kind: PredictiveScaler
metadata:
  name: checkout-scaler
  namespace: phantom
spec:
  targetDeployment: checkout
  minReplicas: 2
  maxReplicas: 15
  predictionHorizonSeconds: 240
  confidenceThreshold: "0.70"
  scaleUpBuffer: "1.3"
---
apiVersion: phantom.io/v1alpha1
kind: PredictiveScaler
metadata:
  name: payment-scaler
  namespace: phantom
spec:
  targetDeployment: payment
  minReplicas: 3
  maxReplicas: 12
  predictionHorizonSeconds: 180
  confidenceThreshold: "0.80"
  scaleUpBuffer: "1.4"
---
apiVersion: phantom.io/v1alpha1
kind: PredictiveScaler
metadata:
  name: cart-scaler
  namespace: phantom
spec:
  targetDeployment: cart
  minReplicas: 2
  maxReplicas: 10
  predictionHorizonSeconds: 300
  confidenceThreshold: "0.72"
  scaleUpBuffer: "1.2"
