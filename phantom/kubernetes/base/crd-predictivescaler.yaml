apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: predictivescalers.phantom.io
spec:
  group: phantom.io
  names:
    kind: PredictiveScaler
    listKind: PredictiveScalerList
    plural: predictivescalers
    singular: predictivescaler
    shortNames: [ps]
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              targetDeployment:
                type: string
              minReplicas:
                type: integer
                minimum: 1
              maxReplicas:
                type: integer
              predictionHorizonSeconds:
                type: integer
                default: 300
              confidenceThreshold:
                type: number
                default: 0.75
              scaleUpBuffer:
                type: number
                default: 1.2
                description: "Multiplier applied to predicted load (e.g. 1.2 = 20% headroom)"
          status:
            type: object
            properties:
              currentReplicas:
                type: integer
              predictedReplicas:
                type: integer
              lastPrediction:
                type: string
              modelConfidence:
                type: number
              phase:
                type: string
                enum: [Predicting, Scaling, Stable, Error]
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Target
      type: string
      jsonPath: .spec.targetDeployment
    - name: Current
      type: integer
      jsonPath: .status.currentReplicas
    - name: Predicted
      type: integer
      jsonPath: .status.predictedReplicas
    - name: Confidence
      type: number
      jsonPath: .status.modelConfidence
    - name: Phase
      type: string
      jsonPath: .status.phase
