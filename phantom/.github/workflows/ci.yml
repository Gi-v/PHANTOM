name: PHANTOM CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/phantom

jobs:

  # ── Lint + Test ─────────────────────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ML deps
        run: pip install -r ml/requirements.txt

      - name: Lint Python (ruff)
        run: |
          pip install ruff
          ruff check ml/gnn_lstm/ ml/graph_builder/ research/

      - name: Python syntax check
        run: |
          python -m py_compile ml/gnn_lstm/model.py
          python -m py_compile ml/gnn_lstm/serve.py
          python -m py_compile ml/gnn_lstm/train.py
          python -m py_compile ml/gnn_lstm/evaluate.py
          python -m py_compile ml/graph_builder/graph_builder.py
          python -m py_compile research/experiment.py
          python -m py_compile research/notebooks/analysis.py

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: controller/go.mod

      - name: Go mod tidy check
        working-directory: controller
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build controller (compile check)
        working-directory: controller
        run: go build ./...

      - name: Go vet
        working-directory: controller
        run: go vet ./...

  # ── Security scan ───────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (secrets + misconfigs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"   # warn only on PRs; fail on push below

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Validate Kubernetes manifests (kubeconform)
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin/
          kubeconform -strict -summary \
            -ignore-missing-schemas \
            -skip ServiceMonitor,PredictiveScaler,ScaledObject \
            kubernetes/base/ kubernetes/overlays/

  # ── Build & push images ─────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: controller
            context: controller
            dockerfile: controller/Dockerfile
          - name: ml-server
            context: ml
            dockerfile: ml/gnn_lstm/Dockerfile
          - name: graph-builder
            context: ml/graph_builder
            dockerfile: ml/graph_builder/Dockerfile
          - name: dashboard
            context: dashboard
            dockerfile: dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (post-build)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Annotate deployment with scan passed
        run: echo "trivy-scan/passed=true"

  # ── GitOps image tag update ─────────────────────────────────────────────────
  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update image tags
        run: |
          sed -i "s|phantom/controller:.*|phantom/controller:${{ github.sha }}|g" \
            kubernetes/base/phantom-controller.yaml
          sed -i "s|phantom/ml-server:.*|phantom/ml-server:${{ github.sha }}|g" \
            kubernetes/base/phantom-ml.yaml
          sed -i "s|phantom/graph-builder:.*|phantom/graph-builder:${{ github.sha }}|g" \
            kubernetes/base/graph-builder.yaml

      - name: Commit and push
        run: |
          git config user.name  "phantom-bot"
          git config user.email "bot@phantom.io"
          git add kubernetes/base/
          git diff --staged --quiet || \
            git commit -m "ci: bump images to ${{ github.sha }}" && git push
